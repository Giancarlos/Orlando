syntax = "proto3";
package orlando.cluster;

// Payload encoding for grain messages.
enum Encoding {
  BINCODE = 0;   // Rust-native, used for silo-to-silo traffic (default)
  PROTOBUF = 1;  // Cross-language, used by external clients
}

// Forwards a serialized grain message to the owning silo.
service GrainTransport {
  rpc Invoke(InvokeRequest) returns (InvokeResponse);
}

message InvokeRequest {
  string grain_type = 1;
  string grain_key = 2;
  string message_type = 3;
  bytes payload = 4;
  Encoding encoding = 5;
  map<string, string> request_context = 6;
}

message InvokeResponse {
  bytes payload = 1;
  string error = 2;
  Encoding encoding = 3;
}

// Membership protocol with SWIM-style failure detection and gossip.
service Membership {
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc NotifyJoin(NotifyJoinRequest) returns (NotifyJoinResponse);
  rpc NotifyLeave(NotifyLeaveRequest) returns (NotifyLeaveResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc PingReq(PingReqRequest) returns (PingReqResponse);
  rpc GetMembers(GetMembersRequest) returns (GetMembersResponse);
}

message SiloAddress {
  string host = 1;
  uint32 port = 2;
  string silo_id = 3;
}

message JoinRequest {
  SiloAddress joiner = 1;
}

message JoinResponse {
  repeated SiloAddress members = 1;
}

// Peer-to-peer notification: a new silo has joined the cluster.
message NotifyJoinRequest {
  SiloAddress silo = 1;
}

message NotifyJoinResponse {}

// Peer-to-peer notification: a silo has been declared dead.
message NotifyLeaveRequest {
  SiloAddress silo = 1;
}

message NotifyLeaveResponse {}

message PingRequest {
  string silo_id = 1;
  repeated GossipEntry gossip = 2;
}

message PingResponse {
  string silo_id = 1;
  repeated GossipEntry gossip = 2;
}

// Indirect ping: ask a peer to ping a target on your behalf (SWIM protocol).
message PingReqRequest {
  SiloAddress target = 1;
  string requester_silo_id = 2;
  repeated GossipEntry gossip = 3;
}

message PingReqResponse {
  bool target_alive = 1;
  repeated GossipEntry gossip = 2;
}

// Gossip update piggybacked on protocol messages.
message GossipEntry {
  enum UpdateType {
    ALIVE = 0;
    SUSPECT = 1;
    DEAD = 2;
    JOIN = 3;
  }
  UpdateType update_type = 1;
  SiloAddress silo = 2;
  uint64 incarnation = 3;
  string reported_by = 4;
}

message GetMembersRequest {}

message GetMembersResponse {
  repeated SiloAddress members = 1;
}
